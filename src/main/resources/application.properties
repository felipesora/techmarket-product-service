spring.application.name=techmarket-product-service

server.port=8101

# MongoDB
spring.data.mongodb.uri=mongodb://${MONGODB_HOST}:${MONGODB_PORT}/techmarket_products

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

server.error.include-stacktrace=never

api.security.token.secret=${JWT_SECRET:12345678}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

#Eureka localmente
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
#eureka.instance.prefer-ip-address=true

#Eureka Container
eureka.client.service-url.defaultZone=http://techmarket-discovery-service:8761/eureka